<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Koan</title>
  <script src="https://appssdk.zoom.us/sdk.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: white; padding: 16px; }
    .header { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid #e5e5e5; }
    .logo { width: 24px; height: 24px; background: linear-gradient(135deg, #2563eb 0%, #1e40af 100%); border-radius: 4px; display: flex; align-items: center; justify-content: center; color: white; font-weight: 700; font-size: 14px; }
    .logo-text h3 { font-size: 13px; font-weight: 600; }
    .answers { min-height: 200px; max-height: 400px; overflow-y: auto; margin-bottom: 12px; }
    .answer { background: #f0f9ff; border-left: 3px solid #2563eb; padding: 10px; margin-bottom: 8px; border-radius: 4px; font-size: 12px; }
    .ans-primary { font-weight: 700; color: #1e40af; margin-bottom: 4px; }
    .ans-detail { color: #1e40af; font-size: 11px; margin-top: 4px; }
    .status { font-size: 11px; color: #666; text-align: center; padding: 8px; background: #fafafa; border-radius: 4px; }
    .status.active { background: #ecfdf5; color: #059669; }
    .test-input-section { margin-top: 12px; padding-top: 12px; border-top: 1px solid #e5e5e5; }
    .test-input-label { font-size: 10px; font-weight: 600; color: #666; margin-bottom: 6px; display: block; }
    .input-group { display: flex; gap: 6px; }
    .test-input { flex: 1; padding: 6px 8px; font-size: 12px; border: 1px solid #d1d5db; border-radius: 4px; font-family: inherit; }
    .test-input:focus { outline: none; border-color: #2563eb; box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.1); }
    .send-btn { padding: 6px 12px; font-size: 12px; font-weight: 600; background: #2563eb; color: white; border: none; border-radius: 4px; cursor: pointer; transition: background 0.2s; }
    .send-btn:hover { background: #1e40af; }
    .send-btn:active { transform: scale(0.98); }
    .debug-panel { margin-top: 12px; padding: 10px; background: #f8f8f8; border: 1px solid #e0e0e0; border-radius: 4px; font-size: 10px; max-height: 200px; overflow-y: auto; }
    .debug-title { font-weight: 600; margin-bottom: 6px; color: #333; }
    .debug-line { margin: 3px 0; color: #555; font-family: monospace; word-break: break-word; }
    .debug-error { color: #d32f2f; }
    .debug-success { color: #388e3c; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">◆</div>
    <div class="logo-text"><h3>Koan</h3></div>
  </div>
  <div class="status" id="status">Initializing...</div>
  <div class="debug-panel" id="debugPanel">
    <div class="debug-title">Debug Info</div>
    <div id="debugOutput"></div>
  </div>
  <div class="answers" id="answers">Listening...</div>
  <div class="test-input-section">
    <label class="test-input-label">Manual Test Input</label>
    <div class="input-group">
      <input type="text" id="testInput" class="test-input" placeholder="Type a transcript line..." />
      <button class="send-btn" onclick="sendManualInput()">Send</button>
    </div>
  </div>

  <script>
    let meetingId = null;
    let sdkReady = false;

    function addDebugLine(text, isError = false, isSuccess = false) {
      console.log(text);
      const debugOutput = document.getElementById('debugOutput');
      const line = document.createElement('div');
      line.className = 'debug-line';
      if (isError) line.classList.add('debug-error');
      if (isSuccess) line.classList.add('debug-success');
      line.textContent = text;
      debugOutput.appendChild(line);
    }

    function updateStatus(text) {
      document.getElementById('status').textContent = text;
      addDebugLine(`STATUS: ${text}`);
    }

    async function initializeApp() {
      if (sdkReady) return;
      sdkReady = true;

      addDebugLine('--- App Initialization Started ---', false, true);

      try {
        // Get app context
        addDebugLine('Calling ZoomSdk.getAppContext()...');
        const ctx = await ZoomSdk.getAppContext();
        meetingId = ctx.meetingID;
        addDebugLine(`Meeting ID: ${meetingId}`, false, true);

        // Get supported APIs
        updateStatus('APIs loading...');
        addDebugLine('Calling ZoomSdk.getSupportedJsApis()...');
        try {
          const supportedApis = await ZoomSdk.getSupportedJsApis();
          addDebugLine(`Available APIs: ${supportedApis.length}`, false, true);
          supportedApis.forEach(api => {
            addDebugLine(`  • ${api}`);
          });
        } catch (apiErr) {
          addDebugLine(`Could not retrieve APIs: ${apiErr.message}`, true);
        }

        updateStatus('APIs loaded');

        // Setup event listeners
        addDebugLine('Setting up event listeners...');
        setupEventListeners();
        addDebugLine('Event listeners ready', false, true);

        // Subscribe to live transcription
        updateStatus('Enabling transcription...');
        addDebugLine('Attempting to enable live transcription...');
        await subscribeToLiveTranscription();

        updateStatus('Listening...');
        document.getElementById('status').classList.add('active');
        addDebugLine('App fully initialized', false, true);

      } catch (e) {
        updateStatus('Error');
        addDebugLine(`ERROR: ${e.message}`, true);
        document.getElementById('status').classList.remove('active');
      }
    }

    // Initialize using ZoomSdk.config() for newer SDK versions
    addDebugLine('Initializing ZoomSdk.config()...', false, true);
    updateStatus('Configuring SDK...');

    let configTimeoutId = null;

    if (ZoomSdk && typeof ZoomSdk.config === 'function') {
      // Start 5-second timeout
      configTimeoutId = setTimeout(() => {
        if (!sdkReady) {
          addDebugLine('ZoomSdk.config() timeout - no response after 5 seconds', true);
          updateStatus('Config timeout');
          // Try fallback
          addDebugLine('Attempting fallback to window.load...', false, true);
        }
      }, 5000);

      // Call config with empty capabilities array for initial test
      addDebugLine('Calling ZoomSdk.config({ capabilities: [] })...');
      ZoomSdk.config({
        capabilities: []
      }).then(() => {
        clearTimeout(configTimeoutId);
        addDebugLine('ZoomSdk.config() resolved successfully!', false, true);
        updateStatus('SDK Ready');
        initializeApp();
      }).catch((err) => {
        clearTimeout(configTimeoutId);
        addDebugLine(`ZoomSdk.config() rejected with error:`, true);
        addDebugLine(`  Error: ${err.message}`, true);
        if (err.stack) {
          addDebugLine(`  Stack: ${err.stack}`, true);
        }
        updateStatus('Config Error');
        // Try fallback to window load anyway
        addDebugLine('Attempting fallback to window.load...', false, true);
      });
    } else {
      addDebugLine('ZoomSdk.config is not available', true);
      updateStatus('No config method');
    }

    // Fallback: Also try window load event
    addDebugLine('Setting up window.addEventListener(load) fallback...');
    window.addEventListener('load', () => {
      addDebugLine('window.load event fired', false, true);
      if (!sdkReady) {
        addDebugLine('Triggering initializeApp from window.load', false, true);
        initializeApp();
      } else {
        addDebugLine('App already initialized, skipping window.load init');
      }
    });

    function setupEventListeners() {
      // Primary listener for live transcription
      addDebugLine('Registering onLiveTranscriptionMessageReceived listener...');
      ZoomSdk.addEventListener('onLiveTranscriptionMessageReceived', async (event) => {
        addDebugLine(`[EVENT FIRED] onLiveTranscriptionMessageReceived`, false, true);
        console.log('onLiveTranscriptionMessageReceived:', event);

        // Extract caption text from payload
        let caption = null;
        if (event.payload) {
          caption = event.payload.text || event.payload.message || event.payload.caption;
        }

        if (caption) {
          addDebugLine(`Transcript received: ${caption.substring(0, 50)}...`);
          await processCaption(caption);
        }
      });
      addDebugLine('onLiveTranscriptionMessageReceived registered', false, true);

      // Secondary listeners for other possible events
      const eventNames = [
        'onLiveTranscriptionMessage',
        'onTranscriptionMessage',
        'onCaption',
        'onCaptionMessage',
        'onActiveSpeaker',
        'onMyActiveSpeakerChange',
        'onMeetingTranscription',
        'onCaptionStatusChange'
      ];

      eventNames.forEach((eventName) => {
        ZoomSdk.addEventListener(eventName, async (event) => {
          console.log(`[EVENT FIRED: ${eventName}]`, event);
          addDebugLine(`[EVENT FIRED] ${eventName}`, false, true);

          // Try to extract caption text from various payload structures
          let caption = null;
          if (event.payload) {
            caption = event.payload.text || event.payload.caption || event.payload.message;
          }

          if (caption) {
            addDebugLine(`Transcript (${eventName}): ${caption.substring(0, 50)}...`);
            await processCaption(caption);
          }
        });
      });

      // Setup manual input form
      document.getElementById('testInput').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
          sendManualInput();
        }
      });

      addDebugLine(`Event listeners registered for ${eventNames.length + 1} events`, false, true);
    }

    async function subscribeToLiveTranscription() {
      addDebugLine('--- Transcription Subscription ---', false, true);

      // Try getLiveTranscription first (primary method)
      if (typeof ZoomSdk.getLiveTranscription === 'function') {
        try {
          addDebugLine('Calling ZoomSdk.getLiveTranscription()...');
          const result = await ZoomSdk.getLiveTranscription();
          addDebugLine('getLiveTranscription() success', false, true);
          if (result) {
            addDebugLine(`Result: ${JSON.stringify(result)}`);
          }
          return;
        } catch (e) {
          addDebugLine(`getLiveTranscription() error: ${e.message}`, true);
        }
      } else {
        addDebugLine('ZoomSdk.getLiveTranscription not available', true);
      }

      // Try startLiveTranscription
      if (typeof ZoomSdk.startLiveTranscription === 'function') {
        try {
          addDebugLine('Calling ZoomSdk.startLiveTranscription()...');
          const result = await ZoomSdk.startLiveTranscription();
          addDebugLine('startLiveTranscription() success', false, true);
          if (result) {
            addDebugLine(`Result: ${JSON.stringify(result)}`);
          }
          return;
        } catch (e) {
          addDebugLine(`startLiveTranscription() error: ${e.message}`, true);
        }
      } else {
        addDebugLine('ZoomSdk.startLiveTranscription not available', true);
      }

      // Try subscribeToTranscription
      if (typeof ZoomSdk.subscribeToTranscription === 'function') {
        try {
          addDebugLine('Calling ZoomSdk.subscribeToTranscription()...');
          const result = await ZoomSdk.subscribeToTranscription();
          addDebugLine('subscribeToTranscription() success', false, true);
          if (result) {
            addDebugLine(`Result: ${JSON.stringify(result)}`);
          }
          return;
        } catch (e) {
          addDebugLine(`subscribeToTranscription() error: ${e.message}`, true);
        }
      } else {
        addDebugLine('ZoomSdk.subscribeToTranscription not available', true);
      }

      // Try enableLiveTranscription
      if (typeof ZoomSdk.enableLiveTranscription === 'function') {
        try {
          addDebugLine('Calling ZoomSdk.enableLiveTranscription()...');
          const result = await ZoomSdk.enableLiveTranscription();
          addDebugLine('enableLiveTranscription() success', false, true);
          if (result) {
            addDebugLine(`Result: ${JSON.stringify(result)}`);
          }
          return;
        } catch (e) {
          addDebugLine(`enableLiveTranscription() error: ${e.message}`, true);
        }
      } else {
        addDebugLine('ZoomSdk.enableLiveTranscription not available', true);
      }

      addDebugLine('No transcription methods available', true);
    }

    async function processCaption(caption) {
      if (!caption || caption.trim() === '') return;

      try {
        const response = await fetch('/zoom/process_caption', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ caption: caption })
        });
        const answer = await response.json();
        displayAnswer(caption, answer);
      } catch (e) {
        console.error('Caption processing error:', e);
      }
    }

    function sendManualInput() {
      const input = document.getElementById('testInput');
      const text = input.value.trim();
      if (text) {
        console.log('[MANUAL INPUT] Sending:', text);
        processCaption(text);
        input.value = '';
        input.focus();
      }
    }

    function displayAnswer(caption, answer) {
      const ar = document.getElementById('answers');
      if (ar.textContent === 'Listening...') ar.innerHTML = '';

      const p = answer.answer.split('\n...\n');
      const e = document.createElement('div');
      e.className = 'answer';
      e.innerHTML = '<div class="ans-primary">' + p[0].trim() + '</div>' +
                    (p[1] ? '<div class="ans-detail">' + p[1].trim() + '</div>' : '');
      ar.insertBefore(e, ar.firstChild);
    }
  </script>
</body>
</html>
