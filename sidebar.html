<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Koan</title>
  <script src="https://appssdk.zoom.us/sdk.min.js"></script>
  <style>
    body { font-family: sans-serif; padding: 16px; background: #fff; }
    h2 { color: #2D8CFF; font-size: 18px; margin: 0; }
    p.tagline { color: #888; font-size: 12px; margin: 4px 0 16px; }
    .status { background: #f0f0f0; padding: 10px; border-radius: 6px; font-size: 13px; }
    .answer { margin-top: 16px; padding: 12px; background: #f7f9ff; border-left: 3px solid #2D8CFF; border-radius: 4px; }
    .answer p { margin: 4px 0; font-size: 13px; }
  </style>
</head>
<body>
  <h2>Koan</h2>
  <p class="tagline">Deep Answers. Real-Time Speed.</p>
  <div class="status" id="status">Connecting...</div>
  <div id="answer"></div>

  <script>
    let ws;

    async function init() {
      try {
        await zoomSdk.config({
          popoutSize: { width: 480, height: 360 },
          capabilities: [
            "getSupportedJsApis",
            "getRunningContext",
            "getMeetingContext",
            "onLiveTranscript"
          ]
        });

        const wsUrl = "wss://" + window.location.host + "/ws/koan/session";
        ws = new WebSocket(wsUrl);

        ws.onopen = () => {
          document.getElementById("status").textContent = "Koan is listening ✓";
        };

        ws.onmessage = (event) => {
          const data = JSON.parse(event.data);
          if (data.action === "answer") {
            const p = data.payload;
            document.getElementById("answer").innerHTML = `
              <div class="answer">
                <p><strong>Q:</strong> ${p.question}</p>
                <p><strong>A:</strong> ${p.answer}</p>
              </div>
            `;
          }
        };

        ws.onerror = () => {
          document.getElementById("status").textContent = "Connection error";
        };

        ws.onclose = () => {
          document.getElementById("status").textContent = "Disconnected — refresh to reconnect";
        };

        // Live transcript from Zoom
        zoomSdk.addEventListener("onLiveTranscript", (event) => {
          const text = event.transcriptData?.transcript || "";
          if (text && ws && ws.readyState === WebSocket.OPEN) {
            document.getElementById("status").textContent = "Heard: " + text;
            ws.send(JSON.stringify({ type: "caption", text: text }));
          }
        });

      } catch (e) {
        document.getElementById("status").textContent = "SDK error: " + e.message;
      }
    }

    init();
  </script>
</body>
</html>
