<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Koan</title>
  <script src="https://appssdk.zoom.us/sdk.min.js"></script>
  <style>
    body { font-family: sans-serif; padding: 16px; background: #fff; }
    h2 { color: #2D8CFF; font-size: 18px; margin: 0; }
    p.tagline { color: #888; font-size: 12px; margin: 4px 0 16px; }
    .status { background: #f0f0f0; padding: 10px; border-radius: 6px; font-size: 13px; }
    .answer { margin-top: 16px; padding: 12px; background: #f7f9ff; border-left: 3px solid #2D8CFF; border-radius: 4px; }
    .answer p { margin: 4px 0; font-size: 13px; }
  </style>
</head>
<body>
  <h2>Koan</h2>
  <p class="tagline">Deep Answers. Real-Time Speed.</p>
  <div class="status" id="status">Connecting...</div>
  <div id="answer"></div>

  <script>
    let ws;

    async function init() {
      try {
        await zoomSdk.config({
          popoutSize: { width: 480, height: 360 },
          capabilities: [
            "getSupportedJsApis",
            "getRunningContext",
            "getMeetingContext",
            "onMyActiveSpeakerChange",
            "getMeetingUUID",
            "onReaction"
          ]
        });

        document.getElementById("status").textContent = "Connecting to Koan...";

        const wsUrl = "wss://" + window.location.host + "/ws/zoom/session";
        ws = new WebSocket(wsUrl);

        ws.onopen = () => {
          document.getElementById("status").textContent = "Koan is listening ✓";
        };

        ws.onmessage = (event) => {
          const data = JSON.parse(event.data);
          if (data.action === "answer") {
            const p = data.payload;
            document.getElementById("answer").innerHTML = `
              <div class="answer">
                <p><strong>Q:</strong> ${p.question}</p>
                <p><strong>A:</strong> ${p.answer}</p>
              </div>
            `;
          }
        };

        ws.onerror = () => {
          document.getElementById("status").textContent = "Connection error";
        };

        ws.onclose = () => {
          document.getElementById("status").textContent = "Disconnected — refresh to reconnect";
        };

        // Listen for caption events via Zoom SDK
        zoomSdk.addEventListener("onMyActiveSpeakerChange", (event) => {
          if (ws && ws.readyState === WebSocket.OPEN) {
            ws.send(JSON.stringify({
              type: "caption",
              text: event.displayName + " is speaking"
            }));
          }
        });

      } catch (e) {
        document.getElementById("status").textContent = "SDK error: " + e.message;
      }
    }

    // Manual caption input for testing
    window.sendCaption = function(text) {
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ type: "caption", text: text }));
      }
    };

    init();
  </script>

  <!-- Test input -->
  <div style="margin-top: 24px; border-top: 1px solid #eee; padding-top: 12px;">
    <input id="testInput" type="text" placeholder="Type a question to test..." 
      style="width:100%; padding:8px; box-sizing:border-box; border:1px solid #ddd; border-radius:4px; font-size:13px;">
    <button onclick="sendCaption(document.getElementById('testInput').value)" 
      style="margin-top:8px; width:100%; padding:8px; background:#2D8CFF; color:white; border:none; border-radius:4px; cursor:pointer; font-size:13px;">
      Send to Koan
    </button>
  </div>
</body>
</html>
