<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Koan - Real-Time AI Assistant</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .container { background: white; border-radius: 20px; box-shadow: 0 25px 80px rgba(0,0,0,0.2); max-width: 700px; width: 100%; padding: 50px 40px; text-align: center; }
    h1 { color: #2563eb; margin-bottom: 8px; font-size: 36px; font-weight: 700; }
    .tagline { color: #6b7280; margin-bottom: 8px; font-size: 15px; }
    .subtitle { color: #9ca3af; margin-bottom: 40px; font-size: 14px; }
    .mic-button { width: 140px; height: 140px; border-radius: 50%; border: none; background: linear-gradient(135deg, #667eea, #764ba2); color: white; font-size: 56px; cursor: pointer; margin: 0 auto 32px; display: flex; align-items: center; justify-content: center; transition: all 0.3s; box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4); }
    .mic-button:hover:not(.listening) { transform: scale(1.08); box-shadow: 0 12px 35px rgba(102, 126, 234, 0.6); }
    .mic-button.listening { background: linear-gradient(135deg, #f93b1d, #ea1e63); animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%, 100% { box-shadow: 0 8px 25px rgba(249, 59, 29, 0.4); } 50% { box-shadow: 0 8px 50px rgba(249, 59, 29, 0.8); } }
    .status-text { color: #6b7280; font-size: 13px; margin-top: 12px; height: 20px; }
    .transcript { background: #f9fafb; border: 2px solid #e5e7eb; border-radius: 12px; padding: 16px; margin: 24px 0; min-height: 50px; text-align: left; color: #374151; font-size: 15px; }
    .transcript.empty { color: #9ca3af; font-style: italic; }
    .answer-box { background: linear-gradient(135deg, #ecfdf5, #f0fdf4); border: 2px solid #10b981; border-radius: 14px; padding: 24px; margin: 24px 0; display: none; text-align: left; }
    .answer-box.show { display: block; animation: slideUp 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); }
    @keyframes slideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
    .answer-label { color: #059669; font-weight: 700; font-size: 11px; text-transform: uppercase; margin-bottom: 8px; }
    .answer-text { color: #065f46; font-size: 16px; line-height: 1.7; }
    .confidence { color: #0d8659; font-size: 12px; margin-top: 14px; padding-top: 14px; border-top: 1px solid rgba(16, 185, 129, 0.2); }
    .error { background: #fef2f2; border: 2px solid #ef4444; border-radius: 12px; padding: 16px; margin: 20px 0; color: #991b1b; display: none; }
    .error.show { display: block; }
    .demo-hint { background: #f0f9ff; border-left: 4px solid #2563eb; padding: 12px 16px; margin-top: 24px; text-align: left; font-size: 13px; color: #1e40af; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎤 Koan</h1>
    <p class="tagline">Deep Answers. Real-Time Speed.</p>
    <p class="subtitle">Ask a question. Get an instant answer.</p>
    <button class="mic-button" id="micButton">🎙️</button>
    <div class="status-text" id="status"></div>
    <div class="transcript empty" id="transcript">Click the mic and ask a question...</div>
    <div class="answer-box" id="answerBox">
      <div class="answer-label">✓ Answer</div>
      <div class="answer-text" id="answerText"></div>
      <div class="confidence" id="confidence"></div>
    </div>
    <div class="error" id="error"></div>
    <div class="demo-hint"><strong>Try asking:</strong> "Are fireworks allowed?" • "What's the cancellation policy?"</div>
  </div>
  <script>
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    const recognition = new SpeechRecognition();
    const micButton = document.getElementById('micButton');
    const transcript = document.getElementById('transcript');
    const answerBox = document.getElementById('answerBox');
    const answerText = document.getElementById('answerText');
    const confidence = document.getElementById('confidence');
    const status = document.getElementById('status');
    const errorDiv = document.getElementById('error');
    recognition.continuous = false;
    recognition.interimResults = true;
    recognition.lang = 'en-US';
    let isListening = false;
    micButton.addEventListener('click', () => {
      if (isListening) recognition.stop();
      else { answerBox.classList.remove('show'); errorDiv.classList.remove('show'); transcript.textContent = 'Listening...'; transcript.classList.remove('empty'); recognition.start(); }
    });
    recognition.onstart = () => { isListening = true; micButton.classList.add('listening'); status.textContent = 'Listening...'; };
    recognition.onresult = (event) => { let interim = ''; for (let i = event.resultIndex; i < event.results.length; i++) { const t = event.results[i][0].transcript; if (event.results[i].isFinal) interim += t + ' '; else interim += t; } transcript.textContent = interim || 'Listening...'; };
    recognition.onend = async () => { isListening = false; micButton.classList.remove('listening'); const finalTranscript = transcript.textContent; if (finalTranscript && finalTranscript !== 'Listening...' && finalTranscript !== 'Click the mic and ask a question...') { status.textContent = 'Getting answer...'; try { const response = await fetch('https://koan-0tws.onrender.com/api/answer', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ text: finalTranscript }) }); const data = await response.json(); if (data.answer) { answerText.textContent = data.answer; confidence.textContent = 'Confidence: ' + data.confidence + '%'; answerBox.classList.add('show'); status.textContent = ''; } else { showError('Sorry, I couldn\'t find an answer to that question.'); } } catch (err) { showError('Connection error. Please try again.'); } } else { transcript.textContent = 'Click the mic and ask a question...'; transcript.classList.add('empty'); } };
    function showError(msg) { errorDiv.textContent = msg; errorDiv.classList.add('show'); }
  </script>
</body>
</html>
