<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Koan - Real-Time Demo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #0f172a; min-height: 100vh; }
    .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 20px; text-align: center; box-shadow: 0 4px 20px rgba(0,0,0,0.2); }
    .header h1 { font-size: 24px; margin-bottom: 4px; }
    .header p { font-size: 13px; opacity: 0.9; }
    .container { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; padding: 20px; max-width: 1400px; margin: 0 auto; height: calc(100vh - 100px); }
    .panel { background: white; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.15); display: flex; flex-direction: column; overflow: hidden; }
    .panel-header { background: linear-gradient(135deg, #f3f4f6 0%, #e5e7eb 100%); padding: 16px; border-bottom: 2px solid #e5e7eb; }
    .panel-header h2 { font-size: 14px; font-weight: 700; color: #1f2937; margin-bottom: 8px; }
    .panel-subheader { font-size: 12px; color: #6b7280; }
    .panel-content { flex: 1; overflow-y: auto; padding: 16px; }
    .transcript-item { margin-bottom: 12px; padding: 12px; border-radius: 8px; animation: slideIn 0.3s ease; }
    @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .transcript-item.customer { background: #eff6ff; border-left: 3px solid #3b82f6; }
    .transcript-speaker { font-size: 11px; font-weight: 700; text-transform: uppercase; color: #6b7280; margin-bottom: 4px; letter-spacing: 0.5px; }
    .transcript-text { font-size: 14px; color: #1f2937; line-height: 1.6; }
    .answer-item { background: linear-gradient(135deg, #ecfdf5 0%, #f0fdf4 100%); border: 2px solid #10b981; border-radius: 10px; padding: 14px; margin-bottom: 14px; animation: slideIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); }
    .answer-q { font-size: 12px; color: #059669; font-weight: 700; text-transform: uppercase; margin-bottom: 8px; letter-spacing: 0.5px; }
    .answer-text { font-size: 14px; color: #065f46; line-height: 1.7; margin-bottom: 10px; }
    .answer-meta { display: flex; justify-content: space-between; font-size: 11px; color: #0d8659; border-top: 1px solid rgba(16, 185, 129, 0.2); padding-top: 8px; }
    .empty-state { text-align: center; padding: 40px 20px; color: #9ca3af; }
    .controls { background: #f9fafb; padding: 16px; border-top: 1px solid #e5e7eb; display: flex; gap: 12px; }
    .btn { flex: 1; padding: 12px 16px; border: none; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
    .btn-primary { background: #2563eb; color: white; }
    .btn-primary:hover:not(:disabled) { background: #1d4ed8; }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-secondary { background: #e5e7eb; color: #374151; }
    .stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; padding: 16px; background: #f9fafb; border-top: 1px solid #e5e7eb; }
    .stat { text-align: center; }
    .stat-label { font-size: 11px; color: #6b7280; font-weight: 600; text-transform: uppercase; }
    .stat-value { font-size: 24px; font-weight: 700; color: #2563eb; margin-top: 4px; }
  </style>
</head>
<body>
  <div class="header">
    <h1>Koan Live Demo</h1>
    <p>Transcript + AI Answers in Real-Time</p>
  </div>
  <div class="container">
    <div class="panel">
      <div class="panel-header">
        <h2>Live Transcript</h2>
        <div class="panel-subheader" id="transcriptStatus">Click START to begin...</div>
      </div>
      <div class="panel-content" id="transcriptContent">
        <div class="empty-state">
          <div class="empty-state-icon">—</div>
          <div>Ready to capture</div>
        </div>
      </div>
      <div class="controls">
        <button class="btn btn-primary" id="startBtn">START LISTENING</button>
        <button class="btn btn-secondary" id="stopBtn" disabled>STOP</button>
      </div>
    </div>
    <div class="panel">
      <div class="panel-header">
        <h2>Agent Answers</h2>
        <div class="panel-subheader" id="answerStatus">Answers appear instantly</div>
      </div>
      <div class="panel-content" id="answerContent">
        <div class="empty-state">
          <div class="empty-state-icon">—</div>
          <div>Waiting for questions...</div>
        </div>
      </div>
      <div class="stats">
        <div class="stat">
          <div class="stat-label">Questions</div>
          <div class="stat-value" id="qCount">0</div>
        </div>
        <div class="stat">
          <div class="stat-label">Answers</div>
          <div class="stat-value" id="aCount">0</div>
        </div>
        <div class="stat">
          <div class="stat-label">Avg Speed</div>
          <div class="stat-value" id="avgSpeed">—</div>
        </div>
      </div>
    </div>
  </div>
  <script>
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    const recognition = new SpeechRecognition();
    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');
    const transcriptContent = document.getElementById('transcriptContent');
    const transcriptStatus = document.getElementById('transcriptStatus');
    const answerContent = document.getElementById('answerContent');
    const qCount = document.getElementById('qCount');
    const aCount = document.getElementById('aCount');
    const avgSpeed = document.getElementById('avgSpeed');
    
    recognition.continuous = true;
    recognition.interimResults = true;
    recognition.lang = 'en-US';
    
    let isListening = false;
    let questionCount = 0;
    let answerCount = 0;
    let responseTimes = [];
    let lastProcessedFinal = '';
    
    startBtn.addEventListener('click', () => {
      isListening = true;
      startBtn.disabled = true;
      stopBtn.disabled = false;
      transcriptContent.innerHTML = '';
      answerContent.innerHTML = '';
      transcriptStatus.textContent = 'Recording...';
      recognition.start();
    });
    
    stopBtn.addEventListener('click', () => {
      isListening = false;
      recognition.stop();
      startBtn.disabled = false;
      stopBtn.disabled = true;
      transcriptStatus.textContent = 'Recording stopped';
    });
    
    recognition.onresult = (event) => {
      if (transcriptContent.querySelector('.empty-state')) {
        transcriptContent.innerHTML = '';
      }
      
      let interimText = '';
      let finalText = '';
      
      for (let i = event.resultIndex; i < event.results.length; i++) {
        const transcript = event.results[i][0].transcript;
        if (event.results[i].isFinal) {
          finalText += transcript + ' ';
        } else {
          interimText += transcript;
        }
      }
      
      if (finalText.trim()) {
        const cleanFinal = finalText.trim();
        if (cleanFinal !== lastProcessedFinal) {
          lastProcessedFinal = cleanFinal;
          addTranscriptItem('Customer', cleanFinal);
          
          questionCount++;
          qCount.textContent = questionCount;
          
          processAnswerForQuestion(cleanFinal);
        }
      }
      
      if (interimText.trim()) {
        updateLastTranscript(interimText);
      }
    };
    
    function addTranscriptItem(speaker, text) {
      const item = document.createElement('div');
      item.className = `transcript-item ${speaker.toLowerCase()}`;
      item.innerHTML = `<div class="transcript-speaker">${speaker}</div><div class="transcript-text">${text}</div>`;
      transcriptContent.appendChild(item);
      transcriptContent.scrollTop = transcriptContent.scrollHeight;
    }
    
    function updateLastTranscript(interimText) {
      let lastItem = transcriptContent.querySelector('.transcript-item:last-child');
      if (!lastItem) return;
      
      const textDiv = lastItem.querySelector('.transcript-text');
      if (textDiv && !lastItem.classList.contains('final')) {
        textDiv.textContent = interimText + ' (listening...)';
      }
    }
    
    async function processAnswerForQuestion(question) {
      const startTime = Date.now();
      try {
        const response = await fetch('https://koan-0tws.onrender.com/api/answer', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text: question })
        });
        const data = await response.json();
        const responseTime = Date.now() - startTime;
        responseTimes.push(responseTime);
        
        if (data.answer) {
          answerCount++;
          aCount.textContent = answerCount;
          const avgTime = Math.round(responseTimes.reduce((a, b) => a + b, 0) / responseTimes.length);
          avgSpeed.textContent = avgTime + 'ms';
          addAnswerItem(question, data.answer, data.confidence, responseTime);
        }
      } catch (err) { console.error('Error:', err); }
    }
    
    function addAnswerItem(question, answer, confidence, responseTime) {
      if (answerContent.querySelector('.empty-state')) { 
        answerContent.innerHTML = ''; 
      }
      const item = document.createElement('div');
      item.className = 'answer-item';
      item.innerHTML = `<div class="answer-q">Q: ${question.substring(0, 60)}${question.length > 60 ? '...' : ''}</div><div class="answer-text">${answer}</div><div class="answer-meta"><span>Confidence: ${confidence}%</span><span>${responseTime}ms</span></div>`;
      answerContent.insertBefore(item, answerContent.firstChild);
      answerContent.scrollTop = 0;
    }
    
    recognition.onend = () => { if (isListening) { recognition.start(); } };
  </script>
</body>
</html>
