<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Koan - Real-Time Call Assistant</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, sans-serif;
      background: #ffffff;
      min-height: 100vh;
    }
    .header {
      background: #1a1a1a;
      color: white;
      padding: 24px;
      border-bottom: 1px solid #e0e0e0;
    }
    .header-inner {
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .logo {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, #2563eb 0%, #1e40af 100%);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      color: white;
      font-size: 20px;
    }
    .header-text h1 {
      font-size: 24px;
      font-weight: 600;
      letter-spacing: -0.5px;
    }
    .header-text p {
      font-size: 13px;
      color: #999;
      margin-top: 4px;
    }
    .container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      padding: 32px 24px;
      max-width: 1400px;
      margin: 0 auto;
    }
    .panel {
      background: white;
      border: 1px solid #e5e5e5;
      border-radius: 8px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .panel-header {
      padding: 20px;
      border-bottom: 1px solid #f0f0f0;
      background: #fafafa;
    }
    .panel-header h2 {
      font-size: 14px;
      font-weight: 600;
      color: #1a1a1a;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }
    .content {
      flex: 1;
      padding: 20px;
      overflow-y: auto;
      min-height: 400px;
      background: white;
    }
    .item {
      margin-bottom: 12px;
      padding: 12px;
      background: #f8f8f8;
      border-left: 3px solid #d1d5db;
      border-radius: 4px;
      font-size: 14px;
      line-height: 1.5;
      color: #333;
    }
    .answer {
      background: #f0f9ff;
      border: 1px solid #bfdbfe;
      border-left: 3px solid #2563eb;
      border-radius: 4px;
      padding: 14px;
      margin-bottom: 12px;
    }
    .ans-question {
      font-size: 12px;
      color: #1e40af;
      font-weight: 600;
      margin-bottom: 8px;
    }
    .ans-primary {
      font-size: 18px;
      font-weight: 700;
      color: #1e40af;
      margin: 6px 0;
    }
    .ans-detail {
      font-size: 13px;
      color: #1e40af;
      margin-top: 6px;
      line-height: 1.4;
    }
    .ans-time {
      font-size: 11px;
      color: #6b7280;
      margin-top: 8px;
    }
    .controls {
      padding: 20px;
      border-top: 1px solid #f0f0f0;
      background: #fafafa;
      display: flex;
      gap: 12px;
    }
    .button {
      padding: 10px 16px;
      border: none;
      border-radius: 6px;
      font-weight: 600;
      cursor: pointer;
      font-size: 13px;
      transition: all 0.2s;
    }
    .btn-primary {
      background: #2563eb;
      color: white;
    }
    .btn-primary:hover { background: #1d4ed8; }
    .btn-primary:disabled {
      background: #d1d5db;
      cursor: not-allowed;
    }
    .btn-secondary {
      background: white;
      color: #1a1a1a;
      border: 1px solid #d1d5db;
    }
    .btn-secondary:hover { background: #f9fafb; }
    .btn-secondary:disabled {
      background: #f3f4f6;
      color: #9ca3af;
      cursor: not-allowed;
    }
    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 12px;
      padding: 20px;
      border-top: 1px solid #f0f0f0;
      background: #fafafa;
    }
    .stat {
      text-align: center;
    }
    .stat-num {
      font-size: 28px;
      font-weight: 700;
      color: #2563eb;
    }
    .stat-label {
      font-size: 11px;
      color: #6b7280;
      text-transform: uppercase;
      margin-top: 4px;
      letter-spacing: 0.5px;
    }
    .empty {
      color: #999;
      font-style: italic;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-inner">
      <div class="logo">◆</div>
      <div class="header-text">
        <h1>Koan</h1>
        <p>Real-time answers for live calls</p>
      </div>
    </div>
  </div>

  <div class="container">
    <div class="panel">
      <div class="panel-header">
        <h2>Live Transcript</h2>
      </div>
      <div class="content" id="transcript">
        <div class="empty">Click START to begin listening...</div>
      </div>
      <div class="controls">
        <button class="button btn-primary" id="startBtn" onclick="startListening()">START</button>
        <button class="button btn-secondary" id="stopBtn" onclick="stopListening()" disabled>STOP</button>
      </div>
    </div>

    <div class="panel">
      <div class="panel-header">
        <h2>Agent Answers</h2>
      </div>
      <div class="content" id="answers">
        <div class="empty">Answers will appear here...</div>
      </div>
      <div class="stats">
        <div class="stat"><div class="stat-num" id="q">0</div><div class="stat-label">Questions</div></div>
        <div class="stat"><div class="stat-num" id="a">0</div><div class="stat-label">Answers</div></div>
        <div class="stat"><div class="stat-num" id="s">—</div><div class="stat-label">Avg Speed</div></div>
      </div>
    </div>
  </div>

  <script>
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    const r = new SR();
    r.continuous = true;
    r.interimResults = true;
    r.lang = 'en-US';
    
    let on = false, qc = 0, ac = 0, ts = [];
    
    function startListening() {
      on = true;
      qc = ac = 0;
      ts = [];
      document.getElementById('transcript').innerHTML = '';
      document.getElementById('answers').innerHTML = '';
      document.getElementById('startBtn').disabled = true;
      document.getElementById('stopBtn').disabled = false;
      r.start();
    }
    
    function stopListening() {
      on = false;
      r.stop();
      document.getElementById('startBtn').disabled = false;
      document.getElementById('stopBtn').disabled = true;
    }
    
    r.onresult = function(e) {
      let final = '';
      for (let i = e.resultIndex; i < e.results.length; i++) {
        if (e.results[i].isFinal) {
          final += e.results[i][0].transcript + ' ';
        }
      }
      
      if (final.trim()) {
        const tr = document.getElementById('transcript');
        if (tr.querySelector('.empty')) tr.innerHTML = '';
        const d = document.createElement('div');
        d.className = 'item';
        d.textContent = final.trim();
        tr.appendChild(d);
        
        qc++;
        document.getElementById('q').textContent = qc;
        
        const st = Date.now();
        fetch('https://koan-0tws.onrender.com/api/answer', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text: final.trim() })
        }).then(r => r.json()).then(data => {
          const time = Date.now() - st;
          if (data.answer) {
            const ar = document.getElementById('answers');
            if (ar.querySelector('.empty')) ar.innerHTML = '';
            const p = data.answer.split('\n...\n');
            const e = document.createElement('div');
            e.className = 'answer';
            e.innerHTML = '<div class="ans-question">Q: ' + final.substring(0, 50) + (final.length > 50 ? '...' : '') + '</div><div class="ans-primary">' + p[0].trim() + '</div>' + (p[1] ? '<div class="ans-detail">' + p[1].trim() + '</div>' : '') + '<div class="ans-time">' + time + 'ms</div>';
            ar.insertBefore(e, ar.firstChild);
            
            ac++;
            document.getElementById('a').textContent = ac;
            
            ts.push(time);
            const avg = Math.round(ts.reduce((a,b) => a+b) / ts.length);
            document.getElementById('s').textContent = avg + 'ms';
          }
        }).catch(err => console.error(err));
      }
    };
    
    r.onerror = function(e) {
      console.error('Error:', e.error);
    };
  </script>
</body>
</html>
