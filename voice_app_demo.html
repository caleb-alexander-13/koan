<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Koan Demo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #0f172a; min-height: 100vh; }
    .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 20px; text-align: center; }
    .container { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; padding: 20px; max-width: 1400px; margin: 0 auto; }
    .panel { background: white; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.15); padding: 20px; }
    .panel h2 { font-size: 16px; margin-bottom: 12px; }
    .content { min-height: 400px; background: #f9fafb; border-radius: 8px; padding: 12px; margin-bottom: 12px; overflow-y: auto; font-size: 14px; }
    .item { margin-bottom: 12px; padding: 10px; background: #eff6ff; border-left: 3px solid #3b82f6; border-radius: 4px; }
    .answer { background: linear-gradient(135deg, #ecfdf5, #f0fdf4); border: 2px solid #10b981; border-radius: 8px; padding: 12px; margin-bottom: 12px; }
    .ans-primary { font-size: 20px; font-weight: 700; color: #059669; margin: 8px 0; }
    .ans-detail { font-size: 12px; color: #0d8659; margin-top: 8px; }
    .button { padding: 10px 16px; margin-right: 8px; border: none; border-radius: 6px; font-weight: 600; cursor: pointer; }
    .btn-primary { background: #2563eb; color: white; }
    .btn-secondary { background: #e5e7eb; color: #333; }
    .stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-top: 12px; }
    .stat { text-align: center; padding: 12px; background: #f9fafb; border-radius: 6px; }
    .stat-num { font-size: 24px; font-weight: 700; color: #2563eb; }
    .stat-label { font-size: 11px; color: #6b7280; text-transform: uppercase; }
  </style>
</head>
<body>
  <div class="header">
    <h1>Koan Live Demo</h1>
    <p>Transcript + AI Answers in Real-Time</p>
  </div>
  <div class="container">
    <div class="panel">
      <h2>Live Transcript</h2>
      <div class="content" id="transcript">Waiting...</div>
      <button class="button btn-primary" onclick="start()">START</button>
      <button class="button btn-secondary" onclick="stop()">STOP</button>
    </div>
    <div class="panel">
      <h2>Agent Answers</h2>
      <div class="content" id="answers">Waiting...</div>
      <div class="stats">
        <div class="stat"><div class="stat-num" id="q">0</div><div class="stat-label">Questions</div></div>
        <div class="stat"><div class="stat-num" id="a">0</div><div class="stat-label">Answers</div></div>
        <div class="stat"><div class="stat-num" id="s">—</div><div class="stat-label">Avg Speed</div></div>
      </div>
    </div>
  </div>

  <script>
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    const r = new SR();
    r.continuous = true;
    r.interimResults = true;
    r.lang = 'en-US';
    
    let on = false, qc = 0, ac = 0, ts = [], lfi = -1;
    
    function start() {
      on = true;
      qc = ac = 0;
      ts = [];
      lfi = -1;
      document.getElementById('transcript').innerHTML = '';
      document.getElementById('answers').innerHTML = '';
      r.start();
    }
    
    function stop() {
      on = false;
      r.stop();
    }
    
    r.onresult = function(e) {
      let interim = '', final = '';
      for (let i = e.resultIndex; i < e.results.length; i++) {
        const t = e.results[i][0].transcript;
        if (e.results[i].isFinal) {
          if (i > lfi) {
            lfi = i;
            final += t + ' ';
          }
        } else {
          interim += t;
        }
      }
      
      if (final.trim()) {
        const tr = document.getElementById('transcript');
        if (tr.textContent === 'Waiting...') tr.innerHTML = '';
        const d = document.createElement('div');
        d.className = 'item';
        d.textContent = final.trim();
        tr.appendChild(d);
        tr.scrollTop = tr.scrollHeight;
        
        qc++;
        document.getElementById('q').textContent = qc;
        
        fetch('https://koan-0tws.onrender.com/api/answer', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text: final.trim() })
        }).then(r => r.json()).then(d => {
          if (d.answer) {
            const ar = document.getElementById('answers');
            if (ar.textContent === 'Waiting...') ar.innerHTML = '';
            const p = d.answer.split('\n...\n');
            const e = document.createElement('div');
            e.className = 'answer';
            e.innerHTML = '<div style="font-size:12px;color:#059669;font-weight:700;">Q: ' + final.substring(0,40) + '...</div><div class="ans-primary">' + p[0].trim() + '</div>' + (p[1] ? '<div class="ans-detail">' + p[1].trim() + '</div>' : '');
            ar.insertBefore(e, ar.firstChild);
            
            ac++;
            document.getElementById('a').textContent = ac;
          }
        }).catch(e => console.error(e));
      }
    };
    
    r.onend = function() {
      if (on) r.start();
    };
  </script>
</body>
</html>
