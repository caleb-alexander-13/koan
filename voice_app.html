<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Koan Voice Assistant</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      background: white;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      max-width: 600px;
      width: 100%;
      padding: 40px;
      text-align: center;
    }
    h1 { color: #2563eb; margin-bottom: 8px; font-size: 32px; }
    .tagline { color: #6b7280; margin-bottom: 32px; font-size: 14px; }
    .mic-button { width: 120px; height: 120px; border-radius: 50%; border: none; background: linear-gradient(135deg, #667eea, #764ba2); color: white; font-size: 48px; cursor: pointer; margin: 0 auto 24px; display: flex; align-items: center; justify-content: center; transition: transform 0.2s; box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4); }
    .mic-button:hover { transform: scale(1.05); }
    .mic-button.listening { background: #f93b1d; animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%, 100% { box-shadow: 0 4px 15px rgba(249, 59, 29, 0.4); } 50% { box-shadow: 0 4px 30px rgba(249, 59, 29, 0.8); } }
    .transcript { background: #f3f4f6; border-radius: 12px; padding: 16px; margin: 20px 0; min-height: 60px; text-align: left; color: #374151; font-size: 16px; line-height: 1.5; }
    .transcript.empty { color: #9ca3af; font-style: italic; }
    .answer-box { background: #ecfdf5; border: 2px solid #10b981; border-radius: 12px; padding: 20px; margin: 20px 0; display: none; }
    .answer-box.show { display: block; animation: slideUp 0.3s ease; }
    @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .answer-label { color: #059669; font-weight: 600; font-size: 12px; text-transform: uppercase; margin-bottom: 8px; }
    .answer-text { color: #065f46; font-size: 16px; line-height: 1.6; }
    .confidence { color: #6b7280; font-size: 12px; margin-top: 12px; padding-top: 12px; border-top: 1px solid #d1d5db; }
    .status { color: #6b7280; font-size: 13px; margin-top: 16px; height: 20px; }
    .error { background: #fef2f2; border: 2px solid #ef4444; border-radius: 12px; padding: 16px; margin: 20px 0; color: #991b1b; display: none; }
    .error.show { display: block; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎤 Koan</h1>
    <p class="tagline">Deep Answers. Real-Time Speed.</p>
    <button class="mic-button" id="micButton">🎙️</button>
    <div class="transcript empty" id="transcript">Say a question...</div>
    <div class="answer-box" id="answerBox">
      <div class="answer-label">Answer</div>
      <div class="answer-text" id="answerText"></div>
      <div class="confidence" id="confidence"></div>
    </div>
    <div class="error" id="error"></div>
    <div class="status" id="status"></div>
  </div>
  <script>
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    const recognition = new SpeechRecognition();
    const micButton = document.getElementById('micButton');
    const transcript = document.getElementById('transcript');
    const answerBox = document.getElementById('answerBox');
    const answerText = document.getElementById('answerText');
    const confidence = document.getElementById('confidence');
    const status = document.getElementById('status');
    const errorDiv = document.getElementById('error');

    recognition.continuous = false;
    recognition.interimResults = true;
    recognition.lang = 'en-US';

    let isListening = false;

    micButton.addEventListener('click', () => {
      if (isListening) {
        recognition.stop();
      } else {
        answerBox.classList.remove('show');
        errorDiv.classList.remove('show');
        transcript.textContent = 'Listening...';
        transcript.classList.remove('empty');
        recognition.start();
      }
    });

    recognition.onstart = () => {
      isListening = true;
      micButton.classList.add('listening');
      status.textContent = 'Listening...';
    };

    recognition.onresult = (event) => {
      let interim = '';
      for (let i = event.resultIndex; i < event.results.length; i++) {
        const t = event.results[i][0].transcript;
        if (event.results[i].isFinal) {
          interim += t + ' ';
        } else {
          interim += t;
        }
      }
      transcript.textContent = interim || 'Listening...';
    };

    recognition.onend = async () => {
      isListening = false;
      micButton.classList.remove('listening');
      const finalTranscript = transcript.textContent;
      
      if (finalTranscript && finalTranscript !== 'Listening...' && finalTranscript !== 'Say a question...') {
        status.textContent = 'Getting answer...';
        try {
          const response = await fetch('https://koan-0tws.onrender.com/api/answer', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ text: finalTranscript })
          });
          
          const data = await response.json();
          if (data.answer) {
            answerText.textContent = data.answer;
            confidence.textContent = `Confidence: ${data.confidence}%`;
            answerBox.classList.add('show');
            status.textContent = '';
          } else {
            showError('No answer found for that question.');
          }
        } catch (err) {
          showError('Error: ' + err.message);
        }
      } else {
        transcript.textContent = 'Say a question...';
        transcript.classList.add('empty');
      }
    };

    function showError(msg) {
      errorDiv.textContent = msg;
      errorDiv.classList.add('show');
      status.textContent = '';
    }
  </script>
</body>
</html>
